<section class="experience-section" id="experience">
  <div class="experience-header">
    <p class="section-tag">Experience</p>
    <h2>Where I’ve worked</h2>
  </div>

  <div class="experience-list" *ngIf="experiences.length">
    <article class="experience-card" #experienceCard *ngFor="let experience of experiences">
      <div class="experience-card__top">
        <div class="experience-card__head">
          <span *ngIf="experience.icon && experience.icon.indexOf('http') === 0" class="experience-card__logo">
            <img [src]="experience.icon" [alt]="experience.company + ' logo'" />
          </span>
          <span *ngIf="!experience.icon || experience.icon.indexOf('http') !== 0" class="experience-card__logo">
            {{ experience.icon || '🛡️' }}
          </span>
          <div>
            <p class="experience-role">{{ experience.role }}</p>
            <h3>{{ experience.company }}</h3>
          </div>
        </div>

        <div class="experience-card__meta">
          <span class="experience-duration">{{ experience.duration }}</span>
        </div>
      </div>

      <ul class="experience-bullets">
        <li *ngFor="let work of experience.workDescription">
          <span class="experience-bullet-icon"></span>
          <span>{{ work }}</span>
        </li>
      </ul>

      <div class="experience-tags">
        <span class="experience-tag" *ngFor="let tech of experience.technologies; let j = index"
              [style.--tag-index]="j">{{ tech }}</span>
      </div>
    </article>
  </div>
</section>
