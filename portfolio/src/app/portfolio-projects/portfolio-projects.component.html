<section class="projects-section" id="projects">
  <div class="projects-header">
    <p class="section-tag">Projects</p>
    <h2>Things I’ve shipped</h2>
  </div>

  <div class="projects-grid" *ngIf="projects.length">
    <article class="project-card" *ngFor="let project of projects">
      <h3>{{ project.name }}</h3>
      <p class="project-description">{{ project.description }}</p>

      <p class="project-highlight" *ngIf="project.highlight">{{ project.highlight }}</p>

      <div class="project-tags" *ngIf="project.tags?.length">
        <span class="project-tag" *ngFor="let t of project.tags">{{ t }}</span>
      </div>
    </article>
  </div>
</section>
